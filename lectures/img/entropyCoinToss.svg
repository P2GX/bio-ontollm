<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450">
  <rect width="500" height="450" fill="#ffffff" />
  
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="50" y1="350" x2="450" y2="350" stroke="#9ca3af" stroke-width="2"/> <line x1="50" y1="50" x2="50" y2="350" stroke="#9ca3af" stroke-width="2"/>  <line x1="50" y1="200" x2="450" y2="200" stroke-dasharray="4" /> <line x1="50" y1="50" x2="450" y2="50" stroke-dasharray="4" />  <line x1="250" y1="50" x2="250" y2="350" stroke-dasharray="4" /> </g>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#374151">
    <text x="215" y="400" font-weight="600">Probability (p)</text>
    <text x="15" y="220" transform="rotate(-90 15,220)" font-weight="600">Entropy H(p)</text>
    
    <text x="45" y="375">0</text>
    <text x="240" y="375">0.5</text>
    <text x="440" y="375">1.0</text>
    
    <text x="25" y="205">0.5</text>
    <text x="25" y="55">1.0</text>
  </g>

  <path d="M 50,350 
           C 100,200 170,50 250,50 
           S 400,200 450,350" 
        fill="none" 
        stroke="#2563eb" 
        stroke-width="4" 
        stroke-linecap="round" />

  <circle cx="250" cy="50" r="5" fill="#ef4444" />
  <text x="260" y="45" font-family="Arial" font-size="12" fill="#ef4444" font-weight="bold">Maximum Uncertainty</text>
</svg>
